<!DOCTYPE html>
<html>
<head>
    <title>Test Buttons</title>
    <style>
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Button Test</h1>
    <button onclick="testFunc()">Click Me</button>
    <div id="result"></div>
    
    <script>
        function testFunc() {
            document.getElementById('result').textContent = 'Button worked!';
            alert('Button clicked!');
        }
    </script>
</body>
</html>
